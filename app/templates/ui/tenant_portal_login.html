<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Tributario — Acceso</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23122C94'/><text x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>C</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/portal.css') }}" rel="stylesheet">
  <style>
    .login-card { max-width: 430px; margin: 6vh auto; }
    .login-header {
      background: linear-gradient(135deg, var(--azul-oscuro) 0%, var(--azul) 100%);
      color: #fff; border-radius: var(--radio) var(--radio) 0 0;
      padding: 34px 32px 26px; text-align: center;
    }
    .login-header .mark { font-size: 2.6rem; opacity: .95; }
    .login-header h4 { font-weight: 800; margin: 12px 0 4px; }
    .login-header p { font-size: .85rem; opacity: .8; margin: 0; }
    .login-body { background: #fff; border-radius: 0 0 var(--radio) var(--radio);
                  padding: 30px; box-shadow: var(--sombra-fuerte); }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="mark"><i class="bi bi-building-check"></i></div>
    <h4>Portal Tributario</h4>
    <p>Facturación Electrónica · CyberShop</p>
  </div>
  <div class="login-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('ui.tenant_login') }}">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="usuario" class="form-control"
                 placeholder="usuario@empresa" autocomplete="username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="••••••••" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center text-muted small mb-0">
      <i class="bi bi-headset me-1"></i>¿Problemas para ingresar? Contacta a tu administrador.
    </p>
    <p class="text-center mt-2 mb-0" style="font-size:.78rem;">
      <a href="{{ url_for('ui.login') }}" class="text-muted">Acceso administrador</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
