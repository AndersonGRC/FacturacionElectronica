<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso — Panel DIAN</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23122C94'/><text x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>C</text></svg>">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="{{ url_for('static', filename='css/portal.css') }}" rel="stylesheet">
  <style>
    .login-card {
      max-width: 390px; margin: 9vh auto 0; border: none;
      box-shadow: var(--sombra-fuerte); border-radius: var(--radio);
    }
    .login-header {
      background: linear-gradient(135deg, var(--azul-oscuro) 0%, var(--azul) 100%);
      border-radius: var(--radio) var(--radio) 0 0;
      padding: 2rem; text-align: center; color: #fff;
    }
    .login-header i { font-size: 2.5rem; }
    .login-header h5 { margin-top: .5rem; margin-bottom: 0; font-weight: 700; letter-spacing: .3px; }
    .login-header small { opacity: .8; font-size: .82rem; }
  </style>
</head>
<body>

<div class="login-card card">
  <div class="login-header">
    <i class="bi bi-shield-lock-fill"></i>
    <h5>CyberShop · Panel DIAN</h5>
    <small>Facturación Electrónica</small>
  </div>
  <div class="card-body p-4">

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
      <div class="alert alert-{{ cat }} alert-dismissible py-2 small" role="alert">
        {{ msg }}
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Contraseña maestra</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-key"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="MASTER_API_KEY" autofocus required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">
        <i class="bi bi-box-arrow-in-right me-1"></i>Ingresar
      </button>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
